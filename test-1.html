<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Fisher-KPP 皮肤伤口愈合与结痂混合模拟</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #eee;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        #info {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
    </div>
    <div id="info">
        <strong>Fisher-KPP 皮肤愈合混合模拟 (2026)</strong><br>
        • 拖动鼠标：划破皮肤制造新伤口 &nbsp;&nbsp; • 亮绿/青色粒子：Leader 细胞 &nbsp;&nbsp; • 暗蓝/紫色粒子：Follower 细胞 &nbsp;&nbsp; • 深褐色：干燥结痂
    </div>

<script>
// ─── 数值稳定性参数表 ──────────────────────────────────────────────
const W = 256, H = 256;
const CELL_PX = 3;
const dx = 4.0;
const dt = 0.08;
const SUBSTEPS = 2;

const D_NORMAL = 0.25;
const R_NORMAL = 0.5;
const GAMMA = 15.0;
const MU = 3.0;
const LEADER_THRESHOLD = 0.04;
const JAMMING_THRESHOLD = 0.97;
const MAX_GRAD = 0.12;

// ─── 数据结构定义 ──────────────────────────────────────────────────
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W * CELL_PX;
canvas.height = H * CELL_PX;

const GRID = {
  dx: dx, dt: dt,
  u:      new Float32Array(W * H),
  uNew:   new Float32Array(W * H),
  D:      new Float32Array(W * H),
  r:      new Float32Array(W * H),
  jammed: new Uint8Array(W * H),
  gradX:  new Float32Array(W * H),
  gradY:  new Float32Array(W * H)
};

class Particle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.role = 0;
    this.jammed = false;
    this.homeX = x; this.homeY = y;
    this.color = '';
    this.radius = 3.0;
  }
}

const ParticleLayer = {
  particles: [],
  init(numParticles) {
    this.particles = [];
    for (let i = 0; i < numParticles; i++) {
      let px = Math.random() * canvas.width;
      let py = Math.random() * canvas.height;
      this.particles.push(new Particle(px, py));
    }
  }
};

// ─── 模块一：GridLayer ──────────────────────────────────────────────
const GridLayer = {
  init() {
    GRID.u.fill(1.0);
    GRID.D.fill(D_NORMAL);
    GRID.r.fill(R_NORMAL);
    GRID.jammed.fill(0);

    const cx = W / 2, cy = H / 2, r0 = 35;
    for (let i = 0; i < H; i++) {
      for (let j = 0; j < W; j++) {
        const dist = Math.hypot(i - cy, j - cx);
        if (dist < r0) {
          GRID.u[i * W + j] = 0.0;
        }
      }
    }
  },

  applyWound(px, py, radius) {
    const ci = Math.floor(py / (GRID.dx * CELL_PX / dx));
    const cj = Math.floor(px / (GRID.dx * CELL_PX / dx));
    const R  = Math.ceil(radius / dx);

    for (let di = -R; di <= R; di++) {
      for (let dj = -R; dj <= R; dj++) {
        if (di*di + dj*dj > R*R) continue;
        const ni = ci + di, nj = cj + dj;
        if (ni < 0 || ni >= H || nj < 0 || nj >= W) continue;
        const idx = ni * W + nj;
        GRID.u[idx]      = 0.0;
        GRID.jammed[idx] = 0;
        GRID.D[idx]      = D_NORMAL;
        GRID.r[idx]      = R_NORMAL;
      }
    }

    for (const p of ParticleLayer.particles) {
      const gci = Math.floor(p.y / (dx * CELL_PX));
      const gcj = Math.floor(p.x / (dx * CELL_PX));
      if (Math.hypot(gci - ci, gcj - cj) <= R) {
        p.jammed = false;
      }
    }
  },

  solve() {
    const { u, uNew, D, r } = GRID;
    const dx2 = dx * dx;

    for (let i = 1; i < H - 1; i++) {
      for (let j = 1; j < W - 1; j++) {
        const idx = i * W + j;

        if (GRID.jammed[idx]) {
          uNew[idx] = u[idx];
          continue;
        }

        const laplacian = (
            u[(i - 1) * W + j]
          + u[(i + 1) * W + j]
          + u[i * W + (j - 1)]
          + u[i * W + (j + 1)]
          - 4 * u[idx]
        ) / dx2;

        const ui = u[idx];
        uNew[idx] = ui + dt * (D[idx] * laplacian + r[idx] * ui * (1 - ui));
        uNew[idx] = Math.max(0.0, Math.min(1.0, uNew[idx]));
      }
    }

    for (let k = 0; k < u.length; k++) u[k] = uNew[k];
    this.applyNeumannBC();
  },

  applyNeumannBC() {
    for (let j = 0; j < W; j++) {
      GRID.u[0 * W + j]         = GRID.u[1 * W + j];
      GRID.u[(H - 1) * W + j]   = GRID.u[(H - 2) * W + j];
    }
    for (let i = 0; i < H; i++) {
      GRID.u[i * W + 0]         = GRID.u[i * W + 1];
      GRID.u[i * W + (W - 1)]   = GRID.u[i * W + (W - 2)];
    }
  },

  computeGradient() {
    const { u } = GRID;
    const inv2dx = 1 / (2 * dx);

    for (let i = 1; i < H - 1; i++) {
      for (let j = 1; j < W - 1; j++) {
        const idx = i * W + j;
        GRID.gradX[idx] = (u[i * W + (j + 1)] - u[i * W + (j - 1)]) * inv2dx;
        GRID.gradY[idx] = (u[(i + 1) * W + j] - u[(i - 1) * W + j]) * inv2dx;
      }
    }
  },

  detectPhase() {
    for (let i = 0; i < H; i++) {
      for (let j = 0; j < W; j++) {
        const idx = i * W + j;
        if (GRID.jammed[idx]) continue;

        if (GRID.u[idx] >= JAMMING_THRESHOLD) {
          GRID.jammed[idx] = 1;
          GRID.D[idx] = 0.0;
          GRID.r[idx] = 0.0;
          GRID.u[idx] = 1.0;
          ParticleLayer.jamParticlesInCell(i, j);
        }
      }
    }
  }
};

// ─── 模块二：ParticleLayer ──────────────────────────────────────────
function bilinearSample(field, px, py) {
  const gx = px / (dx * CELL_PX / dx);
  const gy = py / (dx * CELL_PX / dx);

  const j0 = Math.floor(gx), i0 = Math.floor(gy);
  const j1 = j0 + 1,         i1 = i0 + 1;

  if (i0 < 0 || i1 >= H || j0 < 0 || j1 >= W) return 0;

  const fx = gx - j0;
  const fy = gy - i0;

  return (1 - fx) * (1 - fy) * field[i0 * W + j0]
       +      fx  * (1 - fy) * field[i0 * W + j1]
       + (1 - fx) * fy       * field[i1 * W + j0]
       +      fx  * fy       * field[i1 * W + j1];
}

function sampleGradient(px, py) {
  return {
    gx: bilinearSample(GRID.gradX, px, py),
    gy: bilinearSample(GRID.gradY, px, py),
  };
}

ParticleLayer.jamParticlesInCell = function(ci, cj) {
  for (const p of this.particles) {
    if (p.jammed) continue;
    const pci = Math.floor(p.y / CELL_PX);
    const pcj = Math.floor(p.x / CELL_PX);
    if (pci === ci && pcj === cj) {
      p.jammed = true;
      p.homeX  = p.x;
      p.homeY  = p.y;
      p.vx = p.vy = 0;
    }
  }
};

// ─── 修改一：ParticleLayer.update（含链表式空间哈希斥力） ────────────
ParticleLayer.update = function () {
  GridLayer.computeGradient();

  // 构建链表式空间哈希（TypedArray，无 GC）
  const REPEL_R  = 5.0;
  const K_REPEL  = 5.0;
  const REPEL_R2 = REPEL_R * REPEL_R;
  const sgSz     = REPEL_R;
  const sgW      = Math.ceil(canvas.width  / sgSz) + 1;
  const sgH      = Math.ceil(canvas.height / sgSz) + 1;

  const head    = new Int32Array(sgW * sgH).fill(-1);
  const nextArr = new Int32Array(this.particles.length).fill(-1);

  for (let i = 0; i < this.particles.length; i++) {
    const p = this.particles[i];
    if (p.jammed) continue;
    const key = Math.floor(p.y / sgSz) * sgW + Math.floor(p.x / sgSz);
    nextArr[i] = head[key];
    head[key]  = i;
  }

  for (let i = 0; i < this.particles.length; i++) {
    const p = this.particles[i];

    if (p.jammed) {
      p.x = p.homeX + (Math.random() - 0.5) * 0.3;
      p.y = p.homeY + (Math.random() - 0.5) * 0.3;
      this.updateParticleVisual(p, 0);
      continue;
    }

    const { gx, gy } = sampleGradient(p.x, p.y);

    const fx_active   = -GAMMA * gx;
    const fy_active   = -GAMMA * gy;
    const fx_traction = -MU * p.vx;
    const fy_traction = -MU * p.vy;
    const fx_noise    = (Math.random() - 0.5) * 0.2;
    const fy_noise    = (Math.random() - 0.5) * 0.2;

    // 短程排斥：遍历 3×3 邻域格
    let fx_repel = 0, fy_repel = 0;
    const gi = Math.floor(p.y / sgSz);
    const gj = Math.floor(p.x / sgSz);

    for (let di = -1; di <= 1; di++) {
      for (let dj = -1; dj <= 1; dj++) {
        const ni = gi + di, nj = gj + dj;
        if (ni < 0 || ni >= sgH || nj < 0 || nj >= sgW) continue;
        let qi = head[ni * sgW + nj];
        while (qi !== -1) {
          if (qi !== i) {
            const q   = this.particles[qi];
            const ddx = p.x - q.x;
            const ddy = p.y - q.y;
            const d2  = ddx * ddx + ddy * ddy;
            if (d2 > 0 && d2 < REPEL_R2) {
              const d   = Math.sqrt(d2);
              const mag = K_REPEL * (REPEL_R - d) / d;
              fx_repel += mag * ddx;
              fy_repel += mag * ddy;
            }
          }
          qi = nextArr[qi];
        }
      }
    }

    p.vx += (fx_active + fx_traction + fx_noise + fx_repel) * dt;
    p.vy += (fy_active + fy_traction + fy_noise + fy_repel) * dt;
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;

    if (p.x < 0)             { p.x = 0;             p.vx *= -1; }
    if (p.x > canvas.width)  { p.x = canvas.width;  p.vx *= -1; }
    if (p.y < 0)             { p.y = 0;             p.vy *= -1; }
    if (p.y > canvas.height) { p.y = canvas.height; p.vy *= -1; }

    const gradMag = Math.hypot(gx, gy);
    p.role = gradMag > LEADER_THRESHOLD ? 1 : 0;
    this.updateParticleVisual(p, gradMag);
  }
};

// 颜色映射（调大半径配合滤镜融合）
ParticleLayer.updateParticleVisual = function (p, gradMag) {
  if (p.jammed) {
    p.color  = `hsl(15, 45%, 18%)`;
    p.radius = 2.0;
    return;
  }
  const t   = Math.min(gradMag / MAX_GRAD, 1.0);
  const hue = 240 - t * 130;
  const sat = 40  + t * 55;
  const lum = 20  + t * 40;
  p.radius  = 3.0 + t * 3.0;   // Follower→3.0px，Leader→6.0px
  p.color   = `hsl(${hue.toFixed(0)}, ${sat.toFixed(0)}%, ${lum.toFixed(0)}%)`;
};

// ─── 修改二：RenderLayer.draw（离屏合成 + blur/contrast metaball） ──
const RenderLayer = {
  draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 第一层：KPP 密度场热图
    this.drawFieldHeatmap();

    // 第二层：活跃细胞 → 离屏绘制后整体 blur+contrast 合成
    // blur 让相邻粒子光晕叠加，contrast 阈值化成实色连续细胞块
    if (!this._oc) {
      this._oc        = document.createElement('canvas');
      this._oc.width  = canvas.width;
      this._oc.height = canvas.height;
      this._octx      = this._oc.getContext('2d');
    }
    this._octx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of ParticleLayer.particles) {
      if (p.jammed) continue;
      this._octx.beginPath();
      this._octx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      this._octx.fillStyle = p.color;
      this._octx.fill();
    }
    ctx.filter = 'blur(3px) contrast(7)';
    ctx.drawImage(this._oc, 0, 0);
    ctx.filter = 'none';

    // 第三层：结痂粒子直接绘制，保留粗糙颗粒质感
    for (const p of ParticleLayer.particles) {
      if (!p.jammed) continue;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
  },

  drawFieldHeatmap() {
    const imgData = ctx.createImageData(canvas.width, canvas.height);

    for (let i = 0; i < H; i++) {
      for (let j = 0; j < W; j++) {
        const u      = GRID.u[i * W + j];
        const jammed = GRID.jammed[i * W + j];

        let r, g, b;
        if (jammed) {
          [r, g, b] = [70, 40, 25];
        } else {
          r = Math.floor(50  + u * 150);
          g = Math.floor(10  + u * 90);
          b = Math.floor(15  + u * 60);
        }

        for (let dy = 0; dy < CELL_PX; dy++) {
          for (let ddx = 0; ddx < CELL_PX; ddx++) {
            const px = (((i * CELL_PX + dy) * canvas.width) + (j * CELL_PX + ddx)) * 4;
            imgData.data[px]     = r;
            imgData.data[px + 1] = g;
            imgData.data[px + 2] = b;
            imgData.data[px + 3] = 255;
          }
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);
  }
};

// ─── 主更新循环 ────────────────────────────────────────────────────
function mainLoop() {
  for (let step = 0; step < SUBSTEPS; step++) {
    GridLayer.solve();
    GridLayer.detectPhase();
  }
  ParticleLayer.update();
  RenderLayer.draw();
  requestAnimationFrame(mainLoop);
}

// ─── 鼠标交互 ─────────────────────────────────────────────────────
let isDrawing = false;
canvas.addEventListener('mousedown', (e) => { isDrawing = true; handleWound(e); });
canvas.addEventListener('mousemove', (e) => { if (isDrawing) handleWound(e); });
window.addEventListener('mouseup', () => isDrawing = false);

function handleWound(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  GridLayer.applyWound(x, y, 15);
}

// ─── 系统启动 ─────────────────────────────────────────────────────
GridLayer.init();
ParticleLayer.init(4500);
requestAnimationFrame(mainLoop);
</script>
</body>
</html>
