<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fisher-KPP Skin Wound Healing & Eschar Hybrid Simulation</title>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>
    <style>

        /* ── lil-gui dark theme ── */

            --hover-color: #58182e !important;
            --focus-color: #78203e !important;
            --number-color: #f88060 !important;

            --font-size: 11px !important;

        .lil-gui .disabled { opacity: 0.75 !important; }
    </style>
</head>
<body>

<!-- ── Formula bar ── -->
<div id="formula-bar">
    <span class="eq">∂u/∂t = D∇²u + r·u(1&minus;u)</span>
    <span class="params">
        D=<span id="d-val">0.25</span>&ensp;
        r<sub>eff</sub>=<span id="r-val">0.50</span>&ensp;
        γ=<span id="g-val">15.0</span>&ensp;
        c=<span id="c-val">0.71</span>
        <span style="margin-left:8px;color:#608060">Wave speed c=2√(Dr)</span>
    </span>
</div>

<div id="canvas-container">
    <canvas id="simCanvas"></canvas>
</div>

<div id="info">
    <strong>Fisher-KPP Wound Healing · Active Matter + Biological Cascade (2026)</strong>
    &nbsp;|&nbsp; Drag mouse to create wounds
    &nbsp;|&nbsp; <span style="color:#f88060">Coral-Red</span> Leader cells
    &nbsp;|&nbsp; <span style="color:#8a2040">Rose</span> Follower cells
    &nbsp;|&nbsp; <span style="color:#eee">●</span> Nucleus (individually countable)
    &nbsp;|&nbsp; Brown: Eschar
</div>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════════
// §1  Tunable params P — written by lil-gui, read at runtime
// ══════════════════════════════════════════════════════════════════
const P = {
  GAMMA:       15.0,
  MU:           3.0,
  K_REPEL:      5.0,
  K_ALIGN:      2.5,
  BASE_RADIUS:  2.8,
  NOISE:        0.18,
  D_MULT:       1.0,   // diffusion multiplier
  R_MULT:       1.0,   // proliferation multiplier
};
const MAX_SPEED = 28.0;
const N_PARTICLES = 12000;

// ══════════════════════════════════════════════════════════════════
// §2  Control group presets (4 groups)
// ══════════════════════════════════════════════════════════════════
const PRESETS = {
  'Control (Baseline)':   { GAMMA:15, MU:3.0, K_REPEL:5.0, K_ALIGN:2.5, BASE_RADIUS:2.8, NOISE:0.18, D_MULT:1.00, R_MULT:1.00 },
  'Impaired (Diabetic)':  { GAMMA: 7, MU:5.0, K_REPEL:6.5, K_ALIGN:1.2, BASE_RADIUS:2.3, NOISE:0.42, D_MULT:0.42, R_MULT:0.35 },
  'Enhanced (GF Therapy)':{ GAMMA:22, MU:2.6, K_REPEL:4.5, K_ALIGN:3.2, BASE_RADIUS:3.1, NOISE:0.10, D_MULT:1.00, R_MULT:2.20 },
  'Inflamed (Hyper)':     { GAMMA:42, MU:1.8, K_REPEL:3.2, K_ALIGN:6.0, BASE_RADIUS:3.4, NOISE:0.55, D_MULT:1.40, R_MULT:1.10 },
};

// ══════════════════════════════════════════════════════════════════
// §3  Simulation constants
// ══════════════════════════════════════════════════════════════════
const W = 256, H = 256, CELL_PX = 3;
const dx = 4.0, dt = 0.08, SUBSTEPS = 2;
const D_NORMAL = 0.25, R_NORMAL = 0.5;
const LEADER_THRESHOLD  = 0.04;
const JAMMING_THRESHOLD = 0.97;
const MAX_GRAD = 0.12;
const CW = W * CELL_PX, CH = H * CELL_PX;   // 768 × 768

// ══════════════════════════════════════════════════════════════════
// §4  Canvas
// ══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('simCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = CW;
canvas.height = CH;

// ══════════════════════════════════════════════════════════════════
// §5  KPP field data
// ══════════════════════════════════════════════════════════════════
const GRID = {
  u:      new Float32Array(W * H),
  uNew:   new Float32Array(W * H),
  D:      new Float32Array(W * H),
  r:      new Float32Array(W * H),
  jammed: new Uint8Array(W * H),
  gradX:  new Float32Array(W * H),
  gradY:  new Float32Array(W * H),
};

// ══════════════════════════════════════════════════════════════════
// §6  Biological cascade ODE (ported from wound_model.py)
//     Fibrin → Macrophage → TGF-β → Fibroblast → Collagen
//     1 sim-unit = 0.06 days = 1.44 hours (calibrated to KPP wave speed)
// ══════════════════════════════════════════════════════════════════
const BIO = {
  fibrin:   1.0,
  macro:    0.0,
  tgf:      0.0,
  fibro:    0.0,
  collagen: 0.0,
  phase:    'I · Hemostasis',
  woundPct: 0,
  day:      0,
};

// Readonly display object for lil-gui (auto-updated via .listen())
const bioDisp = { fibrin:1.0, macro:0, tgf:0, fibro:0, collagen:0 };

function updateBioCascade() {
  // dt_bio: biological days advanced per frame
  const dt_bio = SUBSTEPS * dt * 0.060;
  BIO.day += dt_bio;

  // — Fibrin: degraded by macrophage enzymes
  BIO.fibrin  += (-0.12 * BIO.fibrin * (0.1 + BIO.macro) - 0.005 * BIO.fibrin) * dt_bio;
  BIO.fibrin   = Math.max(0, BIO.fibrin);

  // — Macrophage: recruited by fibrin, self-limiting
  BIO.macro   += (1.8 * BIO.fibrin - 0.75 * BIO.macro) * dt_bio;
  BIO.macro    = Math.max(0, Math.min(1, BIO.macro));

  // — TGF-β: produced by macrophages and fibrin
  BIO.tgf     += (2.0 * BIO.macro + 0.25 * BIO.fibrin - 0.85 * BIO.tgf) * dt_bio;
  BIO.tgf      = Math.max(0, Math.min(1, BIO.tgf));

  // — Fibroblast: TGF-β drives migration/proliferation, logistic saturation
  BIO.fibro   += (1.1 * BIO.tgf * (1 - BIO.fibro) - 0.4 * BIO.fibro) * dt_bio;
  BIO.fibro    = Math.max(0, Math.min(1, BIO.fibro));

  // — Collagen: synthesized by Fibroblast × TGF-β, slow maturation
  BIO.collagen += (0.7 * BIO.fibro * BIO.tgf - 0.07 * BIO.collagen) * dt_bio;
  BIO.collagen = Math.max(0, Math.min(1, BIO.collagen));

  // Phase detection
  if      (BIO.day < 1.5) BIO.phase = 'I · Hemostasis';
  else if (BIO.day < 4.0) BIO.phase = 'II · Inflammation';
  else if (BIO.day < 12)  BIO.phase = 'III · Proliferation';
  else                    BIO.phase = 'IV · Remodeling';

  // Bio cascade drives KPP proliferation rate r in wound zone.
  // Fibroblast + TGF-β raise r → accelerates wavefront → nuclei fully jam.
  const r_bio = R_NORMAL * P.R_MULT
              * (0.25 + 2.2 * BIO.fibro + 0.8 * BIO.tgf + 0.3 * (1 - BIO.fibrin));
  const r_capped = Math.min(r_bio, 2.0);
  for (let k = 0; k < GRID.r.length; k++) {
    if (!GRID.jammed[k] && GRID.u[k] < 0.98) GRID.r[k] = r_capped;
  }

  // Compute wound healing percentage (central circle r0=42)
  const cx = W/2, cy = H/2, r0 = 42;
  let total = 0, healed = 0;
  for (let i = (cy-r0)|0; i <= (cy+r0)|0; i++) {
    for (let j = (cx-r0)|0; j <= (cx+r0)|0; j++) {
      if (i<0||i>=H||j<0||j>=W) continue;
      if (Math.hypot(i-cy, j-cx) > r0) continue;
      total++;
      const idx = i*W+j;
      if (GRID.jammed[idx] || GRID.u[idx] >= JAMMING_THRESHOLD) healed++;
    }
  }
  BIO.woundPct = total > 0 ? healed/total*100 : 0;

  // Sync to lil-gui display object
  bioDisp.fibrin   = +BIO.fibrin.toFixed(3);
  bioDisp.macro    = +BIO.macro.toFixed(3);
  bioDisp.tgf      = +BIO.tgf.toFixed(3);
  bioDisp.fibro    = +BIO.fibro.toFixed(3);
  bioDisp.collagen = +BIO.collagen.toFixed(3);
}

// ══════════════════════════════════════════════════════════════════
// §7  Timer & FPS
// ══════════════════════════════════════════════════════════════════
let simTime  = 0;
let fps = 0, _fc = 0, _ft = performance.now();

// ══════════════════════════════════════════════════════════════════
// §8  Spatial hash (pre-allocated, no per-frame GC)
// ══════════════════════════════════════════════════════════════════
const SG_SZ  = 6.0;
const SG_W   = Math.ceil(CW / SG_SZ) + 2;
const SG_H   = Math.ceil(CH / SG_SZ) + 2;
const _sgHead = new Int32Array(SG_W * SG_H);
const _sgNext = new Int32Array(N_PARTICLES);
const ALIGN_R2 = (SG_SZ * 3) * (SG_SZ * 3);
const REPEL_R  = SG_SZ, REPEL_R2 = REPEL_R * REPEL_R;

// ══════════════════════════════════════════════════════════════════
// §9  Particles
// ══════════════════════════════════════════════════════════════════
class Particle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.jammed = false;
    this.homeX = x; this.homeY = y;
    this.role = 0;
    this.radius = P.BASE_RADIUS;
  }
}

const ParticleLayer = {
  particles: [],

  init(n) {
    this.particles = [];
    for (let i=0; i<n; i++)
      this.particles.push(new Particle(Math.random()*CW, Math.random()*CH));
  },

  // Batch jam: O(N) single scan
  jamInCells(jSet) {
    const pts = this.particles;
    for (let i=0; i<pts.length; i++) {
      const p = pts[i];
      if (p.jammed) continue;
      const k = (p.y/CELL_PX|0)*W + (p.x/CELL_PX|0);
      if (jSet.has(k)) { p.jammed=true; p.homeX=p.x; p.homeY=p.y; p.vx=p.vy=0; }
    }
  },

  update() {
    GridLayer.computeGradient();
    const pts = this.particles;
    const N = pts.length;
    const TWO_PI = Math.PI * 2;

    // Rebuild spatial hash
    _sgHead.fill(-1);
    for (let i=0; i<N; i++) {
      const p = pts[i];
      if (p.jammed) continue;
      const key = (p.y/SG_SZ|0)*SG_W + (p.x/SG_SZ|0);
      if (key >= 0 && key < _sgHead.length) { _sgNext[i]=_sgHead[key]; _sgHead[key]=i; }
    }

    for (let i=0; i<N; i++) {
      const p = pts[i];

      if (p.jammed) {
        p.x = p.homeX + (Math.random()-0.5)*0.22;
        p.y = p.homeY + (Math.random()-0.5)*0.22;
        continue;
      }

      // Gradient sampling (bilinear interpolation)
      const gx = bilinearSample(GRID.gradX, p.x, p.y);
      const gy = bilinearSample(GRID.gradY, p.x, p.y);

      let fx = -P.GAMMA * gx - P.MU * p.vx;
      let fy = -P.GAMMA * gy - P.MU * p.vy;

      // Brownian noise (Box-Muller uniform direction approx)
      const na = Math.random() * TWO_PI;
      const nm = (Math.random()+Math.random()) * P.NOISE;
      fx += Math.cos(na)*nm; fy += Math.sin(na)*nm;

      // Neighbors: volume exclusion + Vicsek alignment (single pass)
      let frx=0, fry=0, svx=0, svy=0, na2=0;
      const gi=p.y/SG_SZ|0, gj=p.x/SG_SZ|0;
      for (let di=-2; di<=2; di++) {
        for (let dj=-2; dj<=2; dj++) {
          const ni=gi+di, nj=gj+dj;
          if (ni<0||ni>=SG_H||nj<0||nj>=SG_W) continue;
          let qi = _sgHead[ni*SG_W+nj];
          while (qi !== -1) {
            if (qi !== i) {
              const q=pts[qi];
              const ddx=p.x-q.x, ddy=p.y-q.y;
              const d2=ddx*ddx+ddy*ddy;
              if (d2 > 0) {
                if (d2 < REPEL_R2) {
                  const mag = P.K_REPEL*(REPEL_R-Math.sqrt(d2))/Math.sqrt(d2);
                  frx+=mag*ddx; fry+=mag*ddy;
                }
                if (d2 < ALIGN_R2) { svx+=q.vx; svy+=q.vy; na2++; }
              }
            }
            qi = _sgNext[qi];
          }
        }
      }
      fx += frx; fy += fry;
      if (na2 > 0) { const inv=1/na2; fx+=P.K_ALIGN*(svx*inv-p.vx); fy+=P.K_ALIGN*(svy*inv-p.vy); }

      // Euler integration
      p.vx += fx*dt; p.vy += fy*dt;
      const spd2=p.vx*p.vx+p.vy*p.vy;
      if (spd2 > MAX_SPEED*MAX_SPEED) { const inv=MAX_SPEED/Math.sqrt(spd2); p.vx*=inv; p.vy*=inv; }
      p.x += p.vx*dt; p.y += p.vy*dt;

      // Boundary reflection
      if (p.x<0){p.x=0;p.vx=Math.abs(p.vx);}
      if (p.x>CW){p.x=CW;p.vx=-Math.abs(p.vx);}
      if (p.y<0){p.y=0;p.vy=Math.abs(p.vy);}
      if (p.y>CH){p.y=CH;p.vy=-Math.abs(p.vy);}

      // Role & radius
      const gm = Math.hypot(gx,gy);
      p.role   = gm > LEADER_THRESHOLD ? 1 : 0;
      p.radius = P.BASE_RADIUS * (1 + Math.min(gm/MAX_GRAD,1.0));

      // ★ Key fix: active particles entering already-jammed cells also jam
      const ck = (p.y/CELL_PX|0)*W + (p.x/CELL_PX|0);
      if (ck>=0 && ck<GRID.jammed.length && GRID.jammed[ck]) {
        p.jammed=true; p.homeX=p.x; p.homeY=p.y; p.vx=p.vy=0;
      }
    }
  }
};

// ══════════════════════════════════════════════════════════════════
// §10  Bilinear interpolation
// ══════════════════════════════════════════════════════════════════
function bilinearSample(field, px, py) {
  const gx=px/CELL_PX, gy=py/CELL_PX;
  const j0=gx|0, i0=gy|0, j1=j0+1, i1=i0+1;
  if (i0<0||i1>=H||j0<0||j1>=W) return 0;
  const fx=gx-j0, fy=gy-i0;
  return (1-fx)*(1-fy)*field[i0*W+j0]+fx*(1-fy)*field[i0*W+j1]
       +(1-fx)*   fy  *field[i1*W+j0]+fx*   fy  *field[i1*W+j1];
}

// ══════════════════════════════════════════════════════════════════
// §11  GridLayer — Fisher-KPP solver
// ══════════════════════════════════════════════════════════════════
function cellNoise(ni,nj){ return Math.abs(Math.sin(ni*127.1+nj*311.7)*43758.5453)%1; }

const GridLayer = {
  init() {
    GRID.u.fill(1.0); GRID.D.fill(D_NORMAL); GRID.r.fill(R_NORMAL); GRID.jammed.fill(0);
    const cx=W/2, cy=H/2, r0=35;
    for (let i=0;i<H;i++) for (let j=0;j<W;j++) {
      const dy=i-cy, dj=j-cx, ang=Math.atan2(dy,dj), dist=Math.hypot(dy,dj);
      const ir=r0*(1+0.22*Math.sin(3*ang+0.5)+0.14*Math.sin(7*ang+1.8)+0.09*Math.sin(13*ang+3.1));
      if (dist<ir) GRID.u[i*W+j]=0;
    }
  },

  applyWound(px,py,radius) {
    const ci=py/CELL_PX|0, cj=px/CELL_PX|0, R=Math.ceil(radius/CELL_PX), R2=R*R;
    for (let di=-R;di<=R;di++) for (let dj=-R;dj<=R;dj++) {
      const ni=ci+di, nj=cj+dj;
      if (ni<0||ni>=H||nj<0||nj>=W) continue;
      const d2=di*di+dj*dj;
      if (d2>R2) continue;
      if (d2>R2*0.42 && cellNoise(ni,nj)>0.58) continue;
      const k=ni*W+nj; GRID.u[k]=0; GRID.jammed[k]=0; GRID.D[k]=D_NORMAL; GRID.r[k]=R_NORMAL;
    }
    const pts=ParticleLayer.particles;
    for (let i=0;i<pts.length;i++) {
      const p=pts[i];
      if (Math.hypot((p.y/CELL_PX|0)-ci,(p.x/CELL_PX|0)-cj)<=R) p.jammed=false;
    }
  },

  solve() {
    const {u,uNew,D,r}=GRID, dx2=dx*dx;
    const dm=P.D_MULT;   // diffusion multiplier (takes effect immediately on preset switch)
    for (let i=1;i<H-1;i++) for (let j=1;j<W-1;j++) {
      const idx=i*W+j;
      if (GRID.jammed[idx]){uNew[idx]=u[idx];continue;}
      const lap=(u[(i-1)*W+j]+u[(i+1)*W+j]+u[i*W+(j-1)]+u[i*W+(j+1)]-4*u[idx])/dx2;
      const ui=u[idx];
      // r[idx] set by updateBioCascade based on P.R_MULT and bio cascade
      uNew[idx]=Math.max(0,Math.min(1, ui+dt*(D[idx]*dm*lap + r[idx]*ui*(1-ui))));
    }
    for (let k=0;k<u.length;k++) u[k]=uNew[k];
    // Neumann BC (zero-flux boundary)
    for (let j=0;j<W;j++){GRID.u[j]=GRID.u[W+j];GRID.u[(H-1)*W+j]=GRID.u[(H-2)*W+j];}
    for (let i=0;i<H;i++){GRID.u[i*W]=GRID.u[i*W+1];GRID.u[i*W+W-1]=GRID.u[i*W+W-2];}
  },

  computeGradient() {
    const u=GRID.u, inv=1/(2*dx);
    for (let i=1;i<H-1;i++) for (let j=1;j<W-1;j++) {
      const idx=i*W+j;
      GRID.gradX[idx]=(u[i*W+(j+1)]-u[i*W+(j-1)])*inv;
      GRID.gradY[idx]=(u[(i+1)*W+j]-u[(i-1)*W+j])*inv;
    }
  },

  // O(W×H + N): collect newly jammed cells, single particle scan
  detectPhase() {
    const jSet=new Set();
    for (let i=0;i<H;i++) for (let j=0;j<W;j++) {
      const idx=i*W+j;
      if (!GRID.jammed[idx] && GRID.u[idx]>=JAMMING_THRESHOLD) {
        GRID.jammed[idx]=1; GRID.D[idx]=0; GRID.r[idx]=0; GRID.u[idx]=1; jSet.add(idx);
      }
    }
    if (jSet.size>0) ParticleLayer.jamInCells(jSet);
  }
};

// ══════════════════════════════════════════════════════════════════
// §12  TrailLayer (batched: 2 paths instead of 12000 individual fills)
// ══════════════════════════════════════════════════════════════════
const TrailLayer = {
  _tc:null, _tctx:null,
  init() {
    this._tc=document.createElement('canvas');
    this._tc.width=CW; this._tc.height=CH;
    this._tctx=this._tc.getContext('2d');
  },
  update() {
    const tctx=this._tctx;
    tctx.globalCompositeOperation='destination-out';
    tctx.fillStyle='rgba(0,0,0,0.06)';
    tctx.fillRect(0,0,CW,CH);
    tctx.globalCompositeOperation='source-over';
    const pts=ParticleLayer.particles, rt=P.BASE_RADIUS*0.22;
    tctx.fillStyle='rgba(248,120,70,0.42)';
    tctx.beginPath();
    for (let i=0;i<pts.length;i++){const p=pts[i];if(p.jammed||p.role!==1)continue;tctx.moveTo(p.x+rt,p.y);tctx.arc(p.x,p.y,rt,0,Math.PI*2);}
    tctx.fill();
    tctx.fillStyle='rgba(138,20,56,0.32)';
    tctx.beginPath();
    for (let i=0;i<pts.length;i++){const p=pts[i];if(p.jammed||p.role!==0)continue;tctx.moveTo(p.x+rt,p.y);tctx.arc(p.x,p.y,rt,0,Math.PI*2);}
    tctx.fill();
  },
  draw() {
    ctx.globalAlpha=0.42;
    ctx.drawImage(this._tc,0,0);
    ctx.globalAlpha=1.0;
  }
};

// ══════════════════════════════════════════════════════════════════
// §13  RenderLayer — Plasma-fusion / nucleus-separation + HUD
// ══════════════════════════════════════════════════════════════════
const RenderLayer = {
  _ocPlasma:null, _opCtx:null,
  _ocNuclei:null, _onCtx:null,

  _init() {
    if (this._ocPlasma) return;
    const mk=()=>{const c=document.createElement('canvas');c.width=CW;c.height=CH;return[c,c.getContext('2d')];};
    [this._ocPlasma,this._opCtx]=mk();
    [this._ocNuclei,this._onCtx]=mk();
  },

  draw() {
    this._init();
    ctx.clearRect(0,0,CW,CH);
    this._drawHeatmap();
    TrailLayer.draw();

    // ── Plasma layer (metaball fusion) ────────────────────────────
    const op=this._opCtx;
    op.clearRect(0,0,CW,CH);
    const pts=ParticleLayer.particles;
    const PR=P.BASE_RADIUS;

    op.fillStyle='#e8603a';
    op.beginPath();
    for (let i=0;i<pts.length;i++){const p=pts[i];if(p.jammed||p.role!==1)continue;const r=p.radius*3.0;op.moveTo(p.x+r,p.y);op.arc(p.x,p.y,r,0,Math.PI*2);}
    op.fill();

    op.fillStyle='#781436';
    op.beginPath();
    for (let i=0;i<pts.length;i++){const p=pts[i];if(p.jammed||p.role!==0)continue;const r=PR*3.0;op.moveTo(p.x+r,p.y);op.arc(p.x,p.y,r,0,Math.PI*2);}
    op.fill();

    ctx.filter='blur(4px) contrast(11)';
    ctx.drawImage(this._ocPlasma,0,0);
    ctx.filter='none';

    // ── Nucleus layer (high contrast, individually countable) ─────
    const on=this._onCtx;
    on.clearRect(0,0,CW,CH);
    const nucR=Math.max(0.9,PR*0.38);

    on.fillStyle='rgba(255,234,216,0.93)';
    on.beginPath();
    for (let i=0;i<pts.length;i++){const p=pts[i];if(p.jammed)continue;on.moveTo(p.x+nucR,p.y);on.arc(p.x,p.y,nucR,0,Math.PI*2);}
    on.fill();

    on.strokeStyle='rgba(0,0,0,0.80)'; on.lineWidth=0.9;
    on.beginPath();
    for (let i=0;i<pts.length;i++){const p=pts[i];if(p.jammed)continue;on.moveTo(p.x+nucR,p.y);on.arc(p.x,p.y,nucR,0,Math.PI*2);}
    on.stroke();

    ctx.drawImage(this._ocNuclei,0,0);

    // ── Eschar particle layer (no filter) ────────────────────────
    ctx.fillStyle='rgba(68,28,8,0.88)';
    ctx.beginPath();
    for (let i=0;i<pts.length;i++){const p=pts[i];if(!p.jammed)continue;ctx.moveTo(p.x+1.8,p.y);ctx.arc(p.x,p.y,1.8,0,Math.PI*2);}
    ctx.fill();

    // ── HUD (bottom-right: timer + bio phase + healing progress) ──
    this._drawHUD();
  },

  _drawHUD() {
    const d=BIO.day.toFixed(1);
    const lines=[
      `Day ${d}  |  sim-T ${simTime.toFixed(0)}`,
      BIO.phase,
      `Wound healed: ${BIO.woundPct.toFixed(0)}%`,
      `FPS: ${fps}`,
    ];
    const lh=16, pd=8, bw=232, bh=lh*lines.length+pd*2-2;
    const bx=CW-bw-10, by=CH-bh-10;
    ctx.fillStyle='rgba(6,2,4,0.72)';
    ctx.beginPath();
    ctx.roundRect(bx,by,bw,bh,6);
    ctx.fill();
    ctx.font='11.5px monospace';
    ctx.textAlign='left';
    lines.forEach((t,i)=>{
      ctx.fillStyle = i===2 ? `hsl(${120*BIO.woundPct/100},60%,55%)` : '#c0b0a0';
      ctx.fillText(t, bx+pd, by+pd+13+i*lh);
    });

    // Healing progress bar
    const barY=by+bh-7, barX=bx+pd, barW=bw-pd*2;
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(barX,barY,barW,4);
    ctx.fillStyle=`hsl(${120*BIO.woundPct/100},65%,50%)`;
    ctx.fillRect(barX,barY,barW*BIO.woundPct/100,4);
  },

  _drawHeatmap() {
    const imgData=ctx.createImageData(CW,CH);
    const d=imgData.data;
    for (let i=0;i<H;i++) for (let j=0;j<W;j++) {
      const u=GRID.u[i*W+j], jm=GRID.jammed[i*W+j];
      let r,g,b;
      if (jm){r=80;g=42;b=18;}
      else{r=(88+u*118)|0;g=(14+u*128)|0;b=(18+u*92)|0;}
      const rb=i*CELL_PX*CW;
      for (let dy=0;dy<CELL_PX;dy++){
        const ro=(rb+dy*CW+j*CELL_PX)*4;
        for (let ddx=0;ddx<CELL_PX;ddx++){const px=ro+ddx*4;d[px]=r;d[px+1]=g;d[px+2]=b;d[px+3]=255;}
      }
    }
    ctx.putImageData(imgData,0,0);
  }
};

// ══════════════════════════════════════════════════════════════════
// §14  Formula bar live update
// ══════════════════════════════════════════════════════════════════
const _dVal=document.getElementById('d-val');
const _rVal=document.getElementById('r-val');
const _gVal=document.getElementById('g-val');
const _cVal=document.getElementById('c-val');

function updateFormulaBar() {
  const D_eff=(D_NORMAL*P.D_MULT).toFixed(3);
  const R_eff=(GRID.r[W/2|0*W+W/2|0]).toFixed(3);   // actual r at center cell
  const c_eff=(2*Math.sqrt(D_NORMAL*P.D_MULT * R_NORMAL*P.R_MULT)).toFixed(3);
  _dVal.textContent=D_eff;
  _rVal.textContent=R_eff;
  _gVal.textContent=P.GAMMA.toFixed(1);
  _cVal.textContent=c_eff;
}

// ══════════════════════════════════════════════════════════════════
// §15  Main loop
// ══════════════════════════════════════════════════════════════════
function mainLoop() {
  simTime += SUBSTEPS * dt;
  _fc++;
  const now=performance.now();
  if (now-_ft >= 1000) { fps=Math.round(_fc*1000/(now-_ft)); _fc=0; _ft=now; }

  updateBioCascade();
  for (let s=0;s<SUBSTEPS;s++) { GridLayer.solve(); GridLayer.detectPhase(); }
  ParticleLayer.update();
  TrailLayer.update();
  RenderLayer.draw();
  updateFormulaBar();

  requestAnimationFrame(mainLoop);
}

// ══════════════════════════════════════════════════════════════════
// §16  Mouse / touch
// ══════════════════════════════════════════════════════════════════
let _drawing=false;
canvas.addEventListener('mousedown',e=>{_drawing=true;_wound(e);});
canvas.addEventListener('mousemove',e=>{if(_drawing)_wound(e);});
window.addEventListener('mouseup',()=>{_drawing=false;});
canvas.addEventListener('touchstart',e=>{_drawing=true;_wound(e.touches[0]);e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove', e=>{if(_drawing)_wound(e.touches[0]);e.preventDefault();},{passive:false});
window.addEventListener('touchend',()=>{_drawing=false;});
function _wound(e){const r=canvas.getBoundingClientRect();GridLayer.applyWound(e.clientX-r.left,e.clientY-r.top,15);}

// ══════════════════════════════════════════════════════════════════
// §17  lil-gui control panel

const gui=new lil.GUI({width:240, title:'⬡ Fisher-KPP Console'});

const dynF=gui.addFolder('🔬 Dynamics'); dynF.open();
dynF.add(P,'GAMMA',      0,60,0.5).name('Chemotaxis γ').listen();
dynF.add(P,'MU',         0,12,0.1).name('Friction μ').listen();
dynF.add(P,'K_REPEL',    0,25,0.5).name('Volume Repulsion').listen();
dynF.add(P,'K_ALIGN',    0,12,0.1).name('Vicsek Alignment').listen();
dynF.add(P,'BASE_RADIUS',1, 8,0.1).name('Base Cell Radius').listen();
dynF.add(P,'NOISE',    0,2.5,0.02).name('Brownian Noise').listen();
dynF.add(P,'D_MULT', 0.1,3.0,0.05).name('Diffusion D×').listen();
dynF.add(P,'R_MULT', 0.1,4.0,0.05).name('Proliferation r×').listen();

// — Control group presets
const preF=gui.addFolder('🧪 Control Groups'); preF.open();
Object.entries(PRESETS).forEach(([name,vals])=>{
  preF.add({fn:()=>{ Object.assign(P,vals); }}, 'fn').name(name);
});

// — Reset
gui.add({reset(){
  simTime=0; BIO.fibrin=1;BIO.macro=0;BIO.tgf=0;BIO.fibro=0;BIO.collagen=0;BIO.day=0;
  GridLayer.init(); ParticleLayer.init(N_PARTICLES); TrailLayer.init();
}},'reset').name('↺ Reset / Restart');

// — Bio cascade live monitor (readonly, auto-refreshed via .listen())
const bioF=gui.addFolder('🧬 Bio Cascade (live)');
bioF.add(bioDisp,'fibrin',  0,1).name('Fibrin').listen().disable();
bioF.add(bioDisp,'macro',   0,1).name('Macrophage').listen().disable();
bioF.add(bioDisp,'tgf',     0,1).name('TGF-β').listen().disable();
bioF.add(bioDisp,'fibro',   0,1).name('Fibroblast').listen().disable();
bioF.add(bioDisp,'collagen',0,1).name('Collagen').listen().disable();
bioF.open();

// ══════════════════════════════════════════════════════════════════
// §18  Startup
// ══════════════════════════════════════════════════════════════════
GridLayer.init();
ParticleLayer.init(N_PARTICLES);
TrailLayer.init();
requestAnimationFrame(mainLoop);
</script>
